# Re-register WSL's interop binfmt_misc handler at boot.
#
# WSL2's own /init normally sets this up so that any DOS-magic
# (PE/EXE) binary executed inside the distro is dispatched to the
# `/init` interpreter, which forwards to the Windows host. The
# registration occasionally drops after a `wsl --shutdown` + relaunch
# cycle, leaving `wsl.exe`, `cmd.exe`, `powershell.exe` failing with
# "cannot execute binary file: Exec format error".
#
# systemd-binfmt.service reads /etc/binfmt.d/*.conf on boot (and
# on `systemctl restart systemd-binfmt.service`) and registers each
# entry. This file makes sure WSLInterop comes back regardless of
# whether /init's auto-register fired.
#
# Format: :NAME:TYPE:OFFSET:MAGIC:MASK:INTERPRETER:FLAGS
#   TYPE=M     (match by magic)
#   MAGIC=MZ   (DOS executable header)
#   FLAGS=PF   (preserve argv[0], fix-open)
:WSLInterop:M::MZ::/init:PF
